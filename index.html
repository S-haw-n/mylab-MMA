<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Custom Audio Control Interface — a feature-rich HTML5 audio player with visualizer, keyboard controls, and premium UI design.">
    <title>Audio Control Interface</title>
    <link rel="stylesheet" href="audio-player.css">
</head>
<body>

<!-- Player Card -->
<div class="player-container" id="playerContainer">

    <!-- File Loader -->
    <div class="file-loader">
        <label for="audioFileInput" id="fileLabel">
            <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2l5 5h-5V4zM9 13h6v2H9v-2zm0 4h6v2H9v-2zm0-8h2v2H9V9z"/></svg>
            Choose Audio File
        </label>
        <input type="file" id="audioFileInput" accept="audio/*">
    </div>

    <!-- Track Info -->
    <div class="track-info">
        <div class="track-title" id="trackTitle">No track loaded</div>
        <div class="track-status" id="trackStatus">Load an audio file to begin</div>
    </div>

    <!-- Visualizer -->
    <div class="visualizer-wrapper">
        <canvas id="visualizer"></canvas>
    </div>

    <!-- Progress / Seek Bar -->
    <div class="progress-section">
        <div class="progress-bar-container" id="progressBar">
            <div class="progress-bar-fill" id="progressFill" style="width: 0%;"></div>
        </div>
        <div class="time-display">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <!-- Main Playback Controls -->
    <div class="main-controls">
        <button class="ctrl-btn small" id="btnLoop" data-tooltip="Loop [L]">
            <svg class="icon" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            <span class="badge"></span>
        </button>
        <button class="ctrl-btn medium" id="btnSkipBack" data-tooltip="−10s [←]">
            <svg class="icon" viewBox="0 0 24 24"><path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="10" y="16" font-size="7" text-anchor="middle" fill="currentColor" style="font-weight:700">10</text></svg>
        </button>
        <button class="ctrl-btn play-pause" id="btnPlayPause" data-tooltip="Play [Space]">
            <svg class="icon" id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg class="icon" id="iconPause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn medium" id="btnSkipForward" data-tooltip="+10s [→]">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12.01 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="14" y="16" font-size="7" text-anchor="middle" fill="currentColor" style="font-weight:700">10</text></svg>
        </button>
        <button class="ctrl-btn small" id="btnMute" data-tooltip="Mute [M]">
            <svg class="icon" id="iconVolumeOn" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <svg class="icon" id="iconVolumeOff" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        </button>
    </div>

    <!-- Volume Slider -->
    <div class="volume-section">
        <button class="ctrl-btn small" id="btnVolDown" data-tooltip="Vol −  [↓]">
            <svg class="icon" viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
        </button>
        <div class="volume-slider-wrap">
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
        </div>
        <button class="ctrl-btn small" id="btnVolUp" data-tooltip="Vol +  [↑]">
            <svg class="icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
        <span class="volume-label" id="volumeLabel">80%</span>
    </div>

    <!-- Speed & Extras -->
    <div class="extras-row">
        <div class="speed-control">
            <label>Speed:</label>
            <button class="speed-btn" data-speed="0.5">0.5×</button>
            <button class="speed-btn" data-speed="0.75">0.75×</button>
            <button class="speed-btn active" data-speed="1">1×</button>
            <button class="speed-btn" data-speed="1.25">1.25×</button>
            <button class="speed-btn" data-speed="1.5">1.5×</button>
            <button class="speed-btn" data-speed="2">2×</button>
        </div>
    </div>

    <!-- Keyboard Shortcuts Legend -->
    <div class="keyboard-hints">
        <span class="kbd-hint"><span class="kbd">Space</span> Play</span>
        <span class="kbd-hint"><span class="kbd">M</span> Mute</span>
        <span class="kbd-hint"><span class="kbd">L</span> Loop</span>
        <span class="kbd-hint"><span class="kbd">←→</span> Seek</span>
        <span class="kbd-hint"><span class="kbd">↑↓</span> Volume</span>
    </div>
</div>

<!-- Notification Toast -->
<div class="toast" id="toast"></div>

<!-- External JavaScript -->
<script src="audio-player.js"></script>

</body>
</html>
